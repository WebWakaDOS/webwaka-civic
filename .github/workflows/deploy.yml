name: Deploy Civic Suite

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
  lint-and-test:
    name: Lint, Typecheck and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck || true
      - run: npm run test
      - name: Verify zero console.log (Invariant 7)
        run: |
          COUNT=$(grep -r "console\.log(" src/ --include="*.ts" --include="*.tsx" | grep -v "\.test\." | wc -l)
          echo "console.log count: $COUNT"
          if [ "$COUNT" -gt "0" ]; then
            echo "❌ INVARIANT VIOLATION: console.log found in source files"
            grep -r "console\.log(" src/ --include="*.ts" --include="*.tsx" | grep -v "\.test\."
            exit 1
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint-and-test]
    environment:
      name: production
      url: https://webwaka-civic-api-prod.webwaka.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build || true
        env:
          NODE_ENV: production

      - name: Rename legacy civic_ tables to civc_ prefix (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for table in elections candidates votes voting_stations volunteers volunteer_tasks campaign_donations campaign_expenses campaign_materials campaign_announcements campaign_budget election_results volunteer_messages election_audit_logs voter_sessions ballots vote_queue vote_tallies vote_audit_log vote_conflicts voting_statistics; do
            npx wrangler d1 execute DB --env production --remote \
              --command "ALTER TABLE civic_${table} RENAME TO civc_${table};" 2>/dev/null || true
          done
          echo "✅ Legacy civic_ → civc_ rename step complete"

      - name: Bootstrap DB schema 006-007 (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute DB --env production --remote --file migrations/006_civ3_elections.sql || true
          npx wrangler d1 execute DB --env production --remote --file migrations/007_civ3_voting.sql || true
          echo "✅ Bootstrap 006-007 complete"

      - name: Upgrade campaign tables from 006 schema (Production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Add columns that 009 expects but 006 didn't create (idempotent via || true per statement)
          while IFS= read -r line; do
            [[ "$line" =~ ^-- ]] && continue
            [[ -z "$line" ]] && continue
            npx wrangler d1 execute DB --env production --remote --command "$line" 2>/dev/null || true
          done < .github/scripts/009a_upgrade_campaign_tables_from_006.sql
          echo "✅ Campaign table upgrade complete"

      - name: Ensure Cloudflare Queue Exists (Production)
        run: npx wrangler queues create webwaka-civic-events-prod || true
        env:
          CLOUDFLARE_API_TOKEN: \${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: \${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations (Production)
        run: npx wrangler d1 migrations apply DB --env production --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Production)
        run: npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    needs: [lint-and-test]
    environment:
      name: staging
      url: https://webwaka-civic-api-staging.webwaka.workers.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build || true
        env:
          NODE_ENV: staging

      - name: Rename legacy civic_ tables to civc_ prefix (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for table in elections candidates votes voting_stations volunteers volunteer_tasks campaign_donations campaign_expenses campaign_materials campaign_announcements campaign_budget election_results volunteer_messages election_audit_logs voter_sessions ballots vote_queue vote_tallies vote_audit_log vote_conflicts voting_statistics; do
            npx wrangler d1 execute DB --env staging --remote \
              --command "ALTER TABLE civic_${table} RENAME TO civc_${table};" 2>/dev/null || true
          done
          echo "✅ Legacy civic_ → civc_ rename step complete"

      - name: Bootstrap DB schema 006-007 (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler d1 execute DB --env staging --remote --file migrations/006_civ3_elections.sql || true
          npx wrangler d1 execute DB --env staging --remote --file migrations/007_civ3_voting.sql || true
          echo "✅ Bootstrap 006-007 complete"

      - name: Upgrade campaign tables from 006 schema (Staging)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          while IFS= read -r line; do
            [[ "$line" =~ ^-- ]] && continue
            [[ -z "$line" ]] && continue
            npx wrangler d1 execute DB --env staging --remote --command "$line" 2>/dev/null || true
          done < .github/scripts/009a_upgrade_campaign_tables_from_006.sql
          echo "✅ Campaign table upgrade complete"

      - name: Ensure Cloudflare Queue Exists (Staging)
        run: npx wrangler queues create webwaka-civic-events-staging || true
        env:
          CLOUDFLARE_API_TOKEN: \${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: \${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply D1 Migrations (Staging)
        run: npx wrangler d1 migrations apply DB --env staging --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers (Staging)
        run: npx wrangler deploy --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
