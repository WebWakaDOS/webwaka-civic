<!DOCTYPE html>
<html lang="en-NG">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — WebWaka Civic</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F8FAF9;
      color: #1A2E22;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; color: #1B4332; }
    p { font-size: 15px; color: #6B7C72; line-height: 1.6; max-width: 320px; }
    .btn {
      margin-top: 24px;
      padding: 12px 24px;
      background: #1B4332;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #6B7C72;
      background: #FFF8E1;
      padding: 10px 16px;
      border-radius: 8px;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You are offline</h1>
  <p>WebWaka Civic needs a connection to load. Your data is safely stored and will sync when you reconnect.</p>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
  <div class="note">
    ℹ️ Any donations or member registrations you recorded offline will sync automatically when you are back online.
  </div>
</body>
</html>
