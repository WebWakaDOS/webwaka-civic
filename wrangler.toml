# webwaka-civic — Cloudflare Workers configuration
# Shared 2-DB model: webwaka-production-db + webwaka-staging-db
# Table prefix: civic_

name = "webwaka-civic"
main = "src/worker.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-civic-storage"

# ── Production Environment ──────────────────────────────────────────────────
[env.production]
name = "webwaka-civic-api-prod"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
vars = { ENVIRONMENT = "production" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "webwaka-production-db"
database_id = "d01940d3-d69e-4455-94ba-bc2404cb3872"
migrations_dir = "migrations"

[[env.production.r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-civic-storage"

[env.staging]
name = "webwaka-civic-api-staging"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
vars = { ENVIRONMENT = "staging" }

[[env.staging.d1_databases]]
binding = "DB"
database_name = "webwaka-staging-db"
database_id = "d7278ca0-2408-40d5-a08b-d8456601f667"
migrations_dir = "migrations"

[[env.staging.r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-civic-storage"
