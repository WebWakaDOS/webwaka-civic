name = "webwaka-civic"
main = "src/worker.ts"
compatibility_date = "2024-12-05"
compatibility_flags = ["nodejs_compat"]
account_id = "a5f5864b726209519e0c361f2bb90e79"

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "webwaka-civic-db"
database_id = "79e62be1-38cd-44bc-8d85-df20a2918794"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "webwaka-civic-storage"

[assets]
directory = "./dist"

[build]
command = "npm run build"

